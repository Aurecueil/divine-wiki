name: crowdin-download

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  download:
    name: Download translations from Crowdin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Crowdin download
        uses: crowdin/github-action@v2
        with:
          upload_sources: false
          upload_translations: false
          download_translations: true
          localization_branch_name: crowdin-translations
          create_pull_request: true
          pull_request_title: "i18n: sync translations from Crowdin"
          pull_request_body: "Automated translation sync. Review language-lead sign-off per locale before merge."
          pull_request_labels: "i18n,automated"
          pull_request_base_branch_name: main
          config: crowdin.yml
        env:
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
