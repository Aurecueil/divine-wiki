  "\\bskin changers?\\b": "custom skins"
  "\\bunlock skins\\b": "customize, change the look"
  "\\bundetectable\\b": "safe, client-side"
  "\\bfree[- ]to[- ]play skins\\b": "custom skins"
  "\\bexploit(s|ing)?\\b": "mod"
